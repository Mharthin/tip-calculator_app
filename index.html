<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="card" aria-label="Tip calculator app">
        <h1>Tip Calculator</h1>

        <label class="field" for="bill-amount">
          <span>Bill Amount</span>
          <input id="bill-amount" type="number" min="0" step="0.01" placeholder="0.00" />
          <p class="error-message" id="bill-error" aria-live="polite"></p>
        </label>

        <div class="tip-section">
          <p class="section-title">Tip Percentage</p>
          <div class="tip-buttons" role="group" aria-label="Tip percentages">
            <button type="button" class="tip-btn" data-tip="10">10%</button>
            <button type="button" class="tip-btn" data-tip="15">15%</button>
            <button type="button" class="tip-btn" data-tip="20">20%</button>
            <button type="button" class="tip-btn" data-tip="25">25%</button>
            <button type="button" class="tip-btn custom-btn" data-tip="custom">Custom %</button>
          </div>
          <input id="custom-tip" class="custom-tip-input" type="number" min="0" step="0.01" placeholder="Custom tip %" hidden />
        </div>

        <label class="field" for="people-count">
          <span>Number of People</span>
          <input id="people-count" type="number" min="1" step="1" placeholder="1" />
          <p class="error-message" id="people-error" aria-live="polite"></p>
        </label>

        <section class="results" aria-live="polite">
          <div class="result-row">
            <span>Tip Amount / person</span>
            <strong id="tip-per-person">$0.00</strong>
          </div>
          <div class="result-row">
            <span>Total / person</span>
            <strong id="total-per-person">$0.00</strong>
          </div>
          <div class="result-row grand">
            <span>Grand Total</span>
            <strong id="grand-total">$0.00</strong>
          </div>
        </section>

        <button type="button" id="reset-btn" class="reset-btn">Reset</button>
      </section>

      <section class="history-panel" aria-label="Split history">
        <div class="history-header">
          <h2>Split History</h2>
          <span id="history-count">0 saved</span>
        </div>
        <ul id="history-list" class="history-list"></ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
